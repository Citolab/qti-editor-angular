<main class="app-shell">
  <app-menu-bar
    [appTitle]="appTitle"
    [fileName]="fileName()"
    [savedFiles]="savedFiles()"
    [currentFileId]="currentFileId()"
    (fileNameChange)="fileName.set($event)"
    (newFile)="onNewFile()"
    (saveFile)="onSaveFile()"
    (exportXml)="onExportXml()"
    (loadFile)="onLoadFile($event)"
    (deleteFile)="onDeleteFile($event)"
  ></app-menu-bar>

  @if (errorMessage()) {
    <div class="error-banner" role="alert">
      <span>{{ errorMessage() }}</span>
      <button type="button" class="error-dismiss" (click)="dismissError()" aria-label="Dismiss">×</button>
    </div>
  }

  <app-editor-host
    [identifier]="identifier()"
    [itemTitle]="itemTitle()"
    (contentChange)="onContentChange($event)"
    (metadataChange)="onMetadataChange($event)"
  ></app-editor-host>
</main>
